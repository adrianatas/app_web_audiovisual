<!DOCTYPE html>
<html>
<head>
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #141414;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background-color: #1c1c1c;
            color: #fff;
            border: none;
        }
        .btn-primary {
            background-color: #e50914;
            border: none;
        }
        .btn-success {
            background-color: #ffa00a;
            border: none;
        }
        .navbar {
            background-color: #141414 !important;
        }
        .form-container {
            margin-top: 80px;
        }
        .form-control {
            background-color: #2c2c2c;
            color: #fff;
            border: 1px solid #444;
        }
        .form-control::placeholder {
            color: #aaa;
        }
        a {
            color: #ffa00a;
        }
        a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/">Mi Mundo Audiovisual</a>
    </div>
</nav>

<div class="container form-container">
    <div class="row justify-content-center">
        <div class="col-md-4 card p-4 rounded">
            <h2 class="mb-4 text-center">Registro Cliente</h2>
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Usuario" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Registrarse</button>
            </form>
            <p class="mt-3 text-center"><a href="/login">¿Ya tienes cuenta? Inicia sesión</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
